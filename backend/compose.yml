services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: interview-app:latest
    container_name: interview-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: interview-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: interview-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: interview-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  k6:
    image: grafana/k6
    volumes:
      - ./testing/k6:/scripts:ro
    environment:
      BASE_URL: http://app:8080/api
      USERNAME: admin
      PASSWORD: admin123
    command: run /scripts/load.js
    depends_on:
      - app