test:
  api:
    base-path: /api
    base-url-template: http://localhost:%d${test.api.base-path}
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem
security:
  jwt:
    private-key-location: classpath:keys/private.pem
    public-key-location: classpath:keys/public.pem