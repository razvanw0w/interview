spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  sql:
    init:
      data-locations: classpath:db/data-test.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/test-public.pem
  data:
    redis:
      host: redis
      port: 6379

app:
  cache:
    redis:
      enabled: true

security:
  jwt:
    private-key-location: classpath:keys/test-private.pem
    expiration-seconds: 3600