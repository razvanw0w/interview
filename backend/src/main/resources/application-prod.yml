spring:
  datasource:
    url: jdbc:h2:mem:proddb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: false
  sql:
    init:
      data-locations: classpath:db/data-prod.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/prod-public.pem
  data:
    redis:
      host: redis
      port: 6379

app:
  cache:
    redis:
      enabled: true

management:
  endpoint:
    health:
      show-details: never

security:
  jwt:
    private-key-location: classpath:keys/prod-private.pem
    expiration-seconds: 3600